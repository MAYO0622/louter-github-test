<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./Calculator.css" />
</head>
<body>
    <div class="calculator">

    <div class="display">
        <div class="display__expression" id="expresion"></div>
        <div class="display__result" id="result">0</div>
    </div>
  
    <div class="buttons">

        <button class="btn btn--function" data-action="clear">AC</button>
        <button class="btn btn--function" data-action="sign">+/-</button>
        <button class="btn btn--function" data-action="percent">%</button>
        <button class="btn btn--operator" data-action="operator" data-value="+">+</button>

        <button class="btn btn--number" data-action="number">7</button>
        <button class="btn btn--number" data-action="number">8</button>
        <button class="btn btn--number" data-action="number">9</button>
        <button class="btn btn--operator" data-action="operator" data-value="x">x</button>

        <button class="btn btn--number" data-action="number">4</button>
        <button class="btn btn--number" data-action="number">5</button>
        <button class="btn btn--number" data-action="number">6</button>
        <button class="btn btn--operator" data-action="operator" data-value="-">-</button>

        <button class="btn btn--number" data-action="number">3</button>
        <button class="btn btn--number" data-action="number">2</button>
        <button class="btn btn--number" data-action="number">1</button>
        <button class="btn btn--operator" data-action="operator" data-value="+">+</button>

        <button class="btn btn--number btn--zero" data-action="number" data-value="0">0</button>
        <button class="btn btn--number" data-action="decimal">.</button>
        <button class="btn btn--operator" data-action="calculate">=</button>


        <script src="./Calculator.js"></script>
        </div>
        </div>
</body>
</html>
